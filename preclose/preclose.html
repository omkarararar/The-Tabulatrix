<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabulatrix Pre-Close</title>
    <link rel="stylesheet" href="../assets/lib/oat.min.css">
    <link rel="stylesheet" href="../globals.css">
    <link rel="stylesheet" href="preclose.css">
</head>
<body>
    <div id="precloseDialog" class="dialog hidden">
        <header>
            <span class="category-badge" id="tabCategory">Code</span>
            <span id="countdown">60s</span>
        </header>
        <main>
            <h2 id="tabTitle">Placeholder Title</h2>
            <p id="tabUrl" class="url">https://example.com</p>
            
            <div id="aiSummary" class="ai-summary hidden">
                <strong>AI Summary:</strong>
                <span id="summaryText"></span>
            </div>
        </main>
        <footer>
            <button id="btnSchedule" class="action-btn">Schedule for Later</button>
            <button id="btnSnooze" class="action-btn">Snooze (2h)</button>
            <button id="btnClose" class="action-btn primary">Close Now</button>
        </footer>
        
        <!-- Inline Date Picker (hidden by default) -->
        <div id="datePicker" class="hidden">
            <input type="datetime-local" id="scheduleDatetime">
            <button id="btnConfirmSchedule">Confirm</button>
        </div>
    </div>
    <script type="module" src="preclose.js"></script>
</body>
</html>
