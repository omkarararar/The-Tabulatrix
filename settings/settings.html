<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabulatrix Settings</title>
    <link rel="stylesheet" href="../assets/lib/oat.min.css">
    <link rel="stylesheet" href="../globals.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Settings</h1>
            <p>Configure how Tabulatrix manages your browser.</p>
        </header>
        <main>
            <section class="card">
                <h2>General Rules</h2>
                <div class="field">
                    <label>Idle Threshold</label>
                    <div style="display: flex; gap: var(--spacing-2); align-items: center;">
                        <input type="number" id="idleHours" value="0" min="0" max="99" style="width: 80px;">
                        <span>Hours</span>
                        <input type="number" id="idleMinutes" value="30" min="0" max="59" style="width: 80px;">
                        <span>Minutes</span>
                    </div>
                    <small>Tabs inactive for this long will trigger the pre-close flow. You'll see a countdown.</small>
                </div>
            </section>
            
            <section class="card">
                <h2>AI Classification</h2>
                <div class="field">
                    <label>
                        <input type="checkbox" id="enableAi">
                        Enable Gemini AI Categorization
                    </label>
                </div>
                <div class="field" id="aiKeyField" class="hidden">
                    <label for="geminiKey">Google Gemini API Key</label>
                    <input type="password" id="geminiKey" placeholder="AIzaSy...">
                </div>
            </section>

            <section class="card">
                <h2>Google Calendar Integration</h2>
                <div class="field">
                    <button class="action-btn" id="btnConnectCalendar">Connect Calendar</button>
                    <small>Required to schedule tabs for later.</small>
                </div>
            </section>
        </main>
        <footer>
            <button id="btnSave" class="primary action-btn">Save Settings</button>
        </footer>
    </div>
    <script type="module" src="settings.js"></script>
</body>
</html>
